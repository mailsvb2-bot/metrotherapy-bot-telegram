[tool.ruff]
target-version = "py312"
line-length = 120
src = ["."]
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".tox",
    ".venv",
    ".venv*",
    "venv",
    "venv*",
    "env",
    "env*",
    "__pycache__",
    "build",
    "dist",
    "data",
    "backups",
    "audio",
    "logs",
    "tmp",
]

[tool.ruff.lint]
# Production-safe first-stage gate.
# Keep this narrow: block only syntax/runtime-dangerous errors, not legacy style debt.
select = [
    "E9",    # syntax / parser level pycodestyle errors
    "F821",  # undefined name
    "F822",  # undefined name in __all__
    "F823",  # local variable referenced before assignment
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
follow_imports = "silent"
warn_unused_configs = true
no_implicit_optional = true
check_untyped_defs = false

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "build", "dist", "data", "audio", "logs"]
skips = [
    "B101",  # assert is allowed in internal runtime guards/tests
    "B105",  # reviewed false positives: TTL/env flags/schema names, no hardcoded secrets
    "B311",  # reviewed non-security randomness in load tests and quote rotation
    "B110",  # try/except/pass is used by best-effort diagnostics and is separately reviewed
    "B310",  # controlled urllib calls are already constrained to known provider/local URLs
]

[tool.coverage.run]
branch = true
relative_files = true
source = ["services", "handlers", "core", "runtime", "config"]
omit = [
    "tests/*",
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_also = [
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "@(?:abc\\.)?abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"
show_contexts = true

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.json]
output = "coverage.json"
pretty_print = true
show_contexts = true
