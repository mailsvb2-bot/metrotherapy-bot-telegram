name: Payment Retry Privacy Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Install payment retry privacy contract'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact privacy and terminal patch
        run: python ops/apply_payment_retry_privacy_and_terminal.py

      - name: Validate Python syntax
        run: python -m py_compile services/payments/retry_queue.py services/privacy_manifest.py

      - name: Commit privacy and terminal contract
        run: |
          changes="$(git status --porcelain -- services/payments/retry_queue.py services/privacy_manifest.py)"
          if [ -z "$changes" ]; then
            echo 'PAYMENT_RETRY_PRIVACY_ALREADY_CURRENT'
            exit 0
          fi
          printf '%s\n' "$changes"
          git config user.name 'Metrotherapy Payment Reliability'
          git config user.email 'payment-reliability@metrotherapy.local'
          git add services/payments/retry_queue.py services/privacy_manifest.py
          git commit -m 'Make payment retry privacy-owned and fail visible'
          git push origin "HEAD:${GITHUB_REF_NAME}"
