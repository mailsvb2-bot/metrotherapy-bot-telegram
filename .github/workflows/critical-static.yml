name: Critical Static Surface

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  critical-static:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    name: expanded mypy, Bandit and deploy governance / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      LOAD_DOTENV: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install hash-locked dependencies
        run: |
          python -m pip install --disable-pip-version-check pip==26.1.2
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Validate critical path manifest
        run: python scripts/critical_static_gate.py manifest

      - name: Validate deploy governance and shell syntax
        run: |
          python scripts/check_deploy_governance.py
          bash -n deploy.sh

      - name: Expanded critical type contracts
        run: |
          set -o pipefail
          python scripts/critical_static_gate.py mypy 2>&1 | tee "$RUNNER_TEMP/critical-mypy.log"

      - name: Expanded critical security scan
        run: |
          set -o pipefail
          python scripts/critical_static_gate.py bandit 2>&1 | tee "$RUNNER_TEMP/critical-bandit.log"

      - name: Upload expanded static evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: expanded-critical-static-logs
          path: |
            ${{ runner.temp }}/critical-mypy.log
            ${{ runner.temp }}/critical-bandit.log
          if-no-files-found: warn
