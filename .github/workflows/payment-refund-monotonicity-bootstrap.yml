name: Payment Refund Monotonicity Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact payment monotonicity patch
        run: python ops/apply_payment_refund_monotonicity.py

      - name: Validate Python syntax
        run: python -m py_compile services/payments/reconciliation.py

      - name: Commit reconciliation change
        run: |
          changes="$(git status --porcelain -- services/payments/reconciliation.py)"
          if [ -z "$changes" ]; then
            echo 'PAYMENT_REFUND_MONOTONICITY_ALREADY_APPLIED'
            exit 0
          fi
          printf '%s\n' "$changes"
          git config user.name 'Metrotherapy Payment Reliability'
          git config user.email 'payment-reliability@metrotherapy.local'
          git add services/payments/reconciliation.py
          git commit -m 'Preserve refund state on late payment events'
          git push origin "HEAD:${GITHUB_REF_NAME}"
