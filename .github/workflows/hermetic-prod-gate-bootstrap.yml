name: Hermetic Production Gate Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact regression gate patch
        run: python ops/apply_hermetic_prod_contract_gate.py

      - name: Validate Python syntax
        run: python -m py_compile scripts/regression_gate.py

      - name: Commit regression gate change
        run: |
          changes="$(git status --porcelain -- scripts/regression_gate.py)"
          if [ -z "$changes" ]; then
            echo 'HERMETIC_PROD_GATE_ALREADY_APPLIED'
            exit 0
          fi
          printf '%s\n' "$changes"
          git config user.name 'Metrotherapy Production Contract'
          git config user.email 'production-contract@metrotherapy.local'
          git add scripts/regression_gate.py
          git commit -m 'Require hermetic production config validation'
          git push origin "HEAD:${GITHUB_REF_NAME}"
