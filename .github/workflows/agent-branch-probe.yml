name: Temporary branch workflow probe

on:
  push:
    branches:
      - agent/runtime-hardening-closure

permissions:
  statuses: write

jobs:
  probe:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'agent/branch-workflow-probe',
              description: 'Branch push workflows are running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
