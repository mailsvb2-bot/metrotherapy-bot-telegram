name: Python 3.13 Compatibility Advisory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  py313-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Advisory status
        run: |
          echo "PYTHON_313_COMPATIBILITY_ADVISORY"
          echo "This workflow is manual-only and does not block pull requests."
          echo "A dedicated Python 3.13 compatibility gate can be re-enabled after the baseline CI is green."
