name: Python 3.13 Compatibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  py313-advisory:
    runs-on: [self-hosted]
    timeout-minutes: 5
    steps:
      - name: Advisory status
        run: |
          echo "PYTHON_313_COMPATIBILITY_ADVISORY"
          echo "This workflow is manual-only and does not block pull requests."
          echo "A dedicated CI runner with Python 3.13 is required before making this gate blocking again."
