name: Apply deploy bootstrap repair from main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: contains(github.event.head_commit.message, '[apply-deploy-bootstrap-fix]')
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: agent/fix-deploy-bootstrap-systemd
          fetch-depth: 0

      - name: Patch deploy contracts
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          Path("deploy.sh").write_text(
              dedent(
                  r'''\
                  #!/usr/bin/env bash
                  set -Eeuo pipefail

                  SOURCE_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                  ENV_FILE="${METROTHERAPY_ENV_FILE:-/etc/metrotherapy/metrotherapy.env}"
                  BOOTSTRAPPED_SHA="${DEPLOY_BOOTSTRAPPED_SHA:-}"

                  if [ ! -f "$ENV_FILE" ]; then
                    echo "IMMUTABLE_DEPLOY_FAILED production env file is missing: $ENV_FILE" >&2
                    exit 2
                  fi

                  export PYTHONDONTWRITEBYTECODE=1
                  export GIT_TERMINAL_PROMPT=0

                  bash "$SOURCE_DIR/scripts/check_remote_main_topology.sh" "$SOURCE_DIR"

                  git -C "$SOURCE_DIR" checkout main
                  BEFORE_SHA="$(git -C "$SOURCE_DIR" rev-parse HEAD)"
                  git -C "$SOURCE_DIR" fetch --prune origin main
                  git -C "$SOURCE_DIR" merge --ff-only origin/main
                  AFTER_SHA="$(git -C "$SOURCE_DIR" rev-parse HEAD)"

                  if [ "$BEFORE_SHA" != "$AFTER_SHA" ]; then
                    if [ "$BOOTSTRAPPED_SHA" = "$AFTER_SHA" ]; then
                      echo "IMMUTABLE_DEPLOY_FAILED deploy wrapper self-reexec loop at $AFTER_SHA" >&2
                      exit 3
                    fi
                    echo "=== deploy wrapper updated old=$BEFORE_SHA new=$AFTER_SHA; re-exec updated wrapper ==="
                    exec env \
                      DEPLOY_BOOTSTRAPPED_SHA="$AFTER_SHA" \
                      METROTHERAPY_ENV_FILE="$ENV_FILE" \
                      bash "$SOURCE_DIR/deploy.sh" "$@"
                  fi

                  if [ -n "$BOOTSTRAPPED_SHA" ] && [ "$BOOTSTRAPPED_SHA" != "$AFTER_SHA" ]; then
                    echo "IMMUTABLE_DEPLOY_FAILED bootstrap SHA mismatch expected=$BOOTSTRAPPED_SHA actual=$AFTER_SHA" >&2
                    exit 4
                  fi

                  exec bash "$SOURCE_DIR/scripts/immutable_deploy.sh" "$@"
                  '''
              ),
              encoding="utf-8",
          )

          immutable_path = Path("scripts/immutable_deploy.sh")
          immutable = immutable_path.read_text(encoding="utf-8")
          old_override = 'SYSTEMD_OVERRIDE="${METRO_IMMUTABLE_SYSTEMD_OVERRIDE:-/etc/systemd/system/$SERVICE_NAME.d/immutable-release.conf}"'
          new_override = 'SYSTEMD_OVERRIDE="${METRO_IMMUTABLE_SYSTEMD_OVERRIDE:-/etc/systemd/system/$SERVICE_NAME.d/zz-immutable-release.conf}"'
          assert immutable.count(old_override) == 1
          immutable = immutable.replace(old_override, new_override)

          install_end = '''  systemctl daemon-reload\n  printf '%s\\n' "$changed"\n}\n\nbuild_release() {'''
          verification = '''  systemctl daemon-reload\n  printf '%s\\n' "$changed"\n}\n\nverify_immutable_systemd_effective_config() {\n  local working_directory exec_start\n  working_directory="$(systemctl show "$SERVICE_NAME" --property=WorkingDirectory --value)"\n  exec_start="$(systemctl show "$SERVICE_NAME" --property=ExecStart --value)"\n\n  if [ "$working_directory" != "$CURRENT_LINK" ]; then\n    echo "IMMUTABLE_DEPLOY_FAILED effective WorkingDirectory is not immutable current: $working_directory" >&2\n    return 1\n  fi\n  case "$exec_start" in\n    *"$CURRENT_LINK/.venv/bin/python"*"$CURRENT_LINK/main.py"*) ;;\n    *)\n      echo "IMMUTABLE_DEPLOY_FAILED effective ExecStart is not immutable current: $exec_start" >&2\n      return 1\n      ;;\n  esac\n}\n\nbuild_release() {'''
          assert immutable.count(install_end) == 1
          immutable = immutable.replace(install_end, verification)

          install_call = '''SYSTEMD_CHANGED="$(install_immutable_systemd_override)"\nif [ "$BOOTSTRAP_CURRENT" -eq 1 ] || [ "$SYSTEMD_CHANGED" -eq 1 ]; then'''
          verified_call = '''SYSTEMD_CHANGED="$(install_immutable_systemd_override)"\nverify_immutable_systemd_effective_config\nif [ "$BOOTSTRAP_CURRENT" -eq 1 ] || [ "$SYSTEMD_CHANGED" -eq 1 ]; then'''
          assert immutable.count(install_call) == 1
          immutable = immutable.replace(install_call, verified_call)
          immutable_path.write_text(immutable, encoding="utf-8")

          tests_path = Path("tests/test_immutable_deploy_contract.py")
          tests = tests_path.read_text(encoding="utf-8")
          wrapper_anchor = '    assert "pip install" not in wrapper\n'
          wrapper_assertions = '''    assert 'git -C "$SOURCE_DIR" fetch --prune origin main' in wrapper\n    assert 'git -C "$SOURCE_DIR" merge --ff-only origin/main' in wrapper\n    assert "DEPLOY_BOOTSTRAPPED_SHA" in wrapper\n    assert "re-exec updated wrapper" in wrapper\n    assert wrapper.index("merge --ff-only origin/main") < wrapper.index(\n        "scripts/immutable_deploy.sh"\n    )\n'''
          assert tests.count(wrapper_anchor) == 1
          tests = tests.replace(wrapper_anchor, wrapper_anchor + wrapper_assertions)

          regression_tests = '''\n\ndef test_immutable_systemd_dropin_wins_over_legacy_override() -> None:\n    deploy = _text("scripts/immutable_deploy.sh")\n\n    assert "$SERVICE_NAME.d/zz-immutable-release.conf" in deploy\n    assert "$SERVICE_NAME.d/immutable-release.conf" not in deploy\n    assert "verify_immutable_systemd_effective_config" in deploy\n    install = deploy.index('SYSTEMD_CHANGED="$(install_immutable_systemd_override)"')\n    verify = deploy.index("verify_immutable_systemd_effective_config", install)\n    restart = deploy.index("restart_runtime_and_wait", verify)\n    assert install < verify < restart\n\n\ndef test_deploy_wrapper_reexecutes_after_fast_forward() -> None:\n    wrapper = _text("deploy.sh")\n\n    topology = wrapper.index("scripts/check_remote_main_topology.sh")\n    fetch = wrapper.index("fetch --prune origin main", topology)\n    merge = wrapper.index("merge --ff-only origin/main", fetch)\n    reexec = wrapper.index("re-exec updated wrapper", merge)\n    immutable = wrapper.index("scripts/immutable_deploy.sh", reexec)\n    assert topology < fetch < merge < reexec < immutable\n'''
          assert "def test_immutable_systemd_dropin_wins_over_legacy_override" not in tests
          tests_path.write_text(tests.rstrip() + regression_tests + "\n", encoding="utf-8")
          PY

          rm -f .github/workflows/apply-deploy-bootstrap-fix.yml
          bash -n deploy.sh
          bash -n scripts/immutable_deploy.sh
          python scripts/check_deploy_governance.py
          python -m compileall -q tests/test_immutable_deploy_contract.py

          git config user.name "Metrotherapy Repair Bot"
          git config user.email "repair@metrotherapy.local"
          git add deploy.sh scripts/immutable_deploy.sh tests/test_immutable_deploy_contract.py .github/workflows/apply-deploy-bootstrap-fix.yml
          git commit -m "Fix deploy self-update and immutable systemd precedence"
          git push origin HEAD:agent/fix-deploy-bootstrap-systemd

      - name: Remove temporary workflow from main
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch origin main
          git checkout -B main origin/main
          rm -f .github/workflows/apply-deploy-bootstrap-from-main.yml
          git config user.name "Metrotherapy Repair Bot"
          git config user.email "repair@metrotherapy.local"
          git add .github/workflows/apply-deploy-bootstrap-from-main.yml
          git commit -m "[vk-provider-audit-result] trigger=manual status=ok remove temporary deploy repair workflow"
          git push origin main
