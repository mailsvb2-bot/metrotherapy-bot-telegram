name: User Scenario Matrix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: user-scenario-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  all-user-scenarios:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    name: all public journeys / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      LOAD_DOTENV: '0'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
      TELEGRAM_LEGACY_TOKEN_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Emulate all critical user scenarios
        run: |
          set -o pipefail
          python scripts/all_user_scenario_gate.py 2>&1 | tee "$RUNNER_TEMP/all-user-scenarios.log"

      - name: Upload scenario evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: all-user-scenario-log
          path: ${{ runner.temp }}/all-user-scenarios.log
          if-no-files-found: error
