          register = register.replace('    secret: str\n', '    secret: str\n    ca_bundle: str = ""\n', 1)
          register = register.replace(
              '        secret=_env("MAX_WEBHOOK_SECRET", _env("MAX_SECRET_KEY")),\n',
              '        secret=_env("MAX_WEBHOOK_SECRET", _env("MAX_SECRET_KEY")),\n        ca_bundle=_env("MAX_CA_BUNDLE"),\n',
              1,
          )
          old = '''    if not cfg.secret:\n        missing.append("MAX_WEBHOOK_SECRET")\n    if missing:\n        raise SystemExit("Missing required environment variables: " + ", ".join(missing))\n    if "botapi.max.ru" in cfg.api_base_url:\n        raise SystemExit("MAX_API_BASE_URL must use https://platform-api.max.ru, not legacy botapi.max.ru")\n    if not cfg.api_base_url.startswith(MAX_PLATFORM_API_BASE_URL):\n        raise SystemExit("MAX_API_BASE_URL must start with https://platform-api.max.ru")'''
          new = '''    if not cfg.secret:\n        missing.append("MAX_WEBHOOK_SECRET")\n    if missing:\n        raise SystemExit("Missing required environment variables: " + ", ".join(missing))\n    if not re.fullmatch(r"[A-Za-z0-9_-]{5,256}", cfg.secret):\n        raise SystemExit("MAX_WEBHOOK_SECRET must match [A-Za-z0-9_-]{5,256}")\n    if cfg.api_base_url != MAX_PLATFORM_API_BASE_URL:\n        raise SystemExit("MAX_API_BASE_URL must be exactly https://platform-api2.max.ru")\n    if cfg.ca_bundle and not os.path.isfile(cfg.ca_bundle):\n        raise SystemExit("MAX_CA_BUNDLE file does not exist")'''
