              '''# MAX webhook setup

MAX production uses the official webhook subscription API and the API2 domain.

## Required production variables

```env
MAX_WEBHOOK_ENABLED=1
MAX_BOT_TOKEN=...
MAX_WEBHOOK_SECRET=...
MAX_API_BASE_URL=https://platform-api2.max.ru
MESSENGER_PUBLIC_BASE_URL=https://your-public-domain.example
```

`MAX_WEBHOOK_SECRET` must contain 5–256 characters from `A-Z`, `a-z`, `0-9`, `_`, `-`.

The runtime validates the official webhook header:

```text
X-Max-Bot-Api-Secret
```

Older internal header aliases remain accepted only for compatibility; new registrations must use the official `secret` field of `POST /subscriptions`.

## TLS trust

MAX requires HTTPS with a trusted certificate chain. Python uses the operating-system trust store by default. Keep the server CA store current and include the required trusted certificate chain. When the server uses a dedicated PEM bundle, set:

```env
MAX_CA_BUNDLE=/absolute/path/to/ca-bundle.pem
```

Do not disable TLS verification.

## Register or refresh the subscription

Load the server environment and run the canonical helper:

```bash
set -a
. /etc/metrotherapy/metrotherapy.env
set +a
python scripts/register_max_webhook.py
```

The helper:

- calls `https://platform-api2.max.ru` only;
- sends the bot token in `Authorization`;
- creates the subscription through `POST /subscriptions`;
- passes the secret in the JSON `secret` field;
- verifies that `/webhooks/max` appears in the active subscriptions;
- never prints the bot token or webhook secret.

The old query-secret registration helper was removed. Do not put webhook secrets into URLs or operational screenshots.

## Runtime contract

The public endpoint is:

```text
https://<MESSENGER_PUBLIC_BASE_URL>/webhooks/max
```

The endpoint must return HTTP 200 quickly. Processing and outgoing replies run asynchronously, while duplicate events are suppressed in the database.

## Production audit

A commit whose message contains:

```text
[max-provider-audit-request]
```

asks the deployed worker to verify API2 TLS/authentication and confirm that the expected webhook subscription is active. The result is published as a sanitized commit message beginning with `[max-provider-audit-result]`.
''',
