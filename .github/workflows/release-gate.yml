name: Pre-deploy Release Gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      LOAD_DOTENV: '0'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
      TELEGRAM_LEGACY_TOKEN_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Regression contour
        run: |
          set -o pipefail
          python scripts/regression_gate.py 2>&1 | tee "$RUNNER_TEMP/regression-contour.log"

      - name: Focused mypy gate
        run: >-
          python -m mypy
          services/payments/checkout_intent.py
          services/payments/yookassa_provider.py
          services/payments/verified_reconciliation.py
          runtime/payment_http.py
          services/privacy_controls.py

      - name: Focused Bandit gate
        run: >-
          python -m bandit -q -c pyproject.toml
          services/payments runtime/payment_http.py services/privacy_controls.py

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Release hygiene after checks
        run: python scripts/check_release_hygiene.py

      - name: Post-deploy contract reminder
        run: |
          echo 'PRE_DEPLOY_RELEASE_GATE_OK'
          echo 'After deploy, run scripts/production_gate.py on the production host.'
          echo 'The live gate owns restore drill, Postgres concurrency, Telegram reachability, health and readiness.'
