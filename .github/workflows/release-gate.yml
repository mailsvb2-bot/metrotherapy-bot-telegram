name: Release Gate Advisory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Compile DR release files
        run: |
          python -m compileall \
            services/disaster_recovery_status.py \
            scripts/disaster_recovery_proof.py \
            scripts/release_evidence_snapshot.py \
            handlers/admin_reports/system_checks.py

      - name: Ruff quality gate
        run: python scripts/check_ruff.py

      - name: Disaster recovery backup proof advisory
        run: python scripts/disaster_recovery_proof.py --json
