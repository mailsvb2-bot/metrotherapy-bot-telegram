name: Release gate

on:
  workflow_dispatch:
    inputs:
      env_file:
        description: 'Server env file path used by production_gate.py'
        required: false
        default: '/etc/metrotherapy/metrotherapy.env'
      health_url:
        description: 'Health URL used by production_gate.py'
        required: false
        default: 'http://127.0.0.1:8082/health'
      ready_url:
        description: 'Readiness URL used by production_gate.py'
        required: false
        default: 'http://127.0.0.1:8082/readyz'

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      APP_ENV: prod
      VALIDATOR_RELEASE_MODE: '1'
      VALIDATOR_GUARDRAILS_STRICT: '1'
      VALIDATOR_SKIP_AUDIO: '1'
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      METRO_DB_ENGINE: postgres
      METRO_RESTORE_DRILL_DATABASE_URL: ${{ secrets.METRO_RESTORE_DRILL_DATABASE_URL }}
      RESTORE_DATABASE_URL: ${{ secrets.RESTORE_DATABASE_URL }}
      YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
      YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
      PAYMENT_CHECKOUT_SIGNING_KEY: ${{ secrets.PAYMENT_CHECKOUT_SIGNING_KEY }}
      YOOKASSA_WEBHOOK_SECRET: ${{ secrets.YOOKASSA_WEBHOOK_SECRET }}
      YOOKASSA_RECEIPT_EMAIL: ${{ secrets.YOOKASSA_RECEIPT_EMAIL }}
      PAYMENT_PUBLIC_BASE_URL: ${{ secrets.PAYMENT_PUBLIC_BASE_URL }}
      TOKEN_ECONOMY_ENABLED: '1'
      TOKEN_ENFORCEMENT_MODE: hard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Release hygiene
        run: python scripts/check_release_hygiene.py

      - name: Compile release surface
        run: |
          python -m compileall \
            services \
            scripts \
            handlers \
            core \
            runtime \
            config \
            app.py \
            main.py

      - name: Ruff quality gate
        run: python scripts/check_ruff.py

      - name: Disaster recovery proof advisory
        run: python scripts/disaster_recovery_proof.py --json

      - name: Require restore drill target
        run: |
          if [ -z "${METRO_RESTORE_DRILL_DATABASE_URL:-${RESTORE_DATABASE_URL:-}}" ]; then
            echo 'METRO_RESTORE_DRILL_DATABASE_URL or RESTORE_DATABASE_URL secret is required.' >&2
            exit 1
          fi

      - name: Strict production readiness gate
        run: |
          python scripts/production_gate.py \
            --env-file "${{ inputs.env_file }}" \
            --health-url "${{ inputs.health_url }}" \
            --ready-url "${{ inputs.ready_url }}"
