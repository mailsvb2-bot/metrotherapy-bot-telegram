name: Pre-deploy Release Gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      LOAD_DOTENV: '0'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
      TELEGRAM_LEGACY_TOKEN_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Regression contour
        run: |
          set -o pipefail
          python scripts/regression_gate.py 2>&1 | tee "$RUNNER_TEMP/regression-contour.log"

      - name: Critical type contracts
        run: |
          set -o pipefail
          python -m mypy --follow-imports=skip --check-untyped-defs \
            services/accounts/identity.py \
            services/messenger/text_ui.py \
            services/messenger/delivery_outbox.py \
            services/payments/checkout_intent.py \
            services/payments/telegram_stars.py \
            services/payments/telegram_stars_refunds.py \
            services/payments/verified_reconciliation.py \
            services/practice_token_lots.py \
            services/practice_tokens_access_core.py \
            services/practice_tokens_wallet.py \
            services/premium_entitlements.py \
            services/sales_desk.py \
            services/sales_desk_repository.py \
            services/sales_desk_sync.py \
            runtime/payment_http.py \
            runtime/payment_webhook_admission.py \
            services/privacy_controls.py \
            2>&1 | tee "$RUNNER_TEMP/release-mypy.log"

      - name: Critical Bandit gate
        run: |
          set -o pipefail
          python -m bandit -q -r -c pyproject.toml \
            services/payments \
            services/accounts/identity.py \
            services/messenger/text_ui.py \
            services/messenger/delivery_outbox.py \
            services/practice_token_lots.py \
            services/practice_tokens_access_core.py \
            services/practice_tokens_wallet.py \
            services/premium_entitlements.py \
            services/sales_desk.py \
            services/sales_desk_db.py \
            services/sales_desk_repository.py \
            services/sales_desk_sync.py \
            runtime/payment_http.py \
            runtime/payment_webhook_admission.py \
            services/privacy_controls.py \
            2>&1 | tee "$RUNNER_TEMP/release-bandit.log"

      - name: Dependency audit
        run: |
          set -o pipefail
          python -m pip_audit -r requirements.txt --progress-spinner off \
            2>&1 | tee "$RUNNER_TEMP/release-pip-audit.log"

      - name: Release hygiene after checks
        run: python scripts/check_release_hygiene.py

      - name: Upload release gate logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pre-deploy-release-gate-logs
          path: |
            ${{ runner.temp }}/regression-contour.log
            ${{ runner.temp }}/release-mypy.log
            ${{ runner.temp }}/release-bandit.log
            ${{ runner.temp }}/release-pip-audit.log
          if-no-files-found: warn

      - name: Post-deploy contract reminder
        run: |
          echo 'PRE_DEPLOY_RELEASE_GATE_OK'
          echo 'After deploy, run scripts/production_gate.py on the production host.'
          echo 'The live gate owns restore drill, Postgres concurrency, messenger outbox, Telegram reachability, health and readiness.'
