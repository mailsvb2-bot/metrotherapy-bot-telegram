                  return bool(row)


          def mark_delivery_once(user_id: int, key: str) -> bool:
              with db() as conn:
                  conn.execute(
                      "INSERT OR IGNORE INTO idempotency(user_id, key, created_at) VALUES(?,?,?)",
                      (user_id, key, int(time.time())),
