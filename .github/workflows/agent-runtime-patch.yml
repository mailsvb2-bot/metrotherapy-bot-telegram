name: One-shot audited runtime patch

on:
  push:
    branches:
      - agent/runtime-hardening-closure

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/runtime-hardening-closure
          fetch-depth: 0

      - name: Apply deterministic audited patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one patch target, got {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          # 1) Canonical DB API and reusable Postgres connection pre-ping.
          replace_once(
              "services/db/core.py",
              '''def _raw_pg_connection_is_usable(conn: Any) -> bool:
              try:
                  return not bool(getattr(conn, "closed", False))
              except Exception:  # validator: allow-wide-except
                  return False
          ''',
              '''def _raw_pg_connection_is_usable(conn: Any) -> bool:
              """Prove that a cached Postgres connection is alive before reuse.

              A socket can be severed by PostgreSQL, a proxy or the network while
              psycopg still reports ``closed == False``. A lightweight pre-ping plus
              rollback prevents the next business transaction from inheriting a
              dead or ping-opened transaction.
              """
              try:
                  if bool(getattr(conn, "closed", False)):
                      return False
                  conn.execute("SELECT 1")
                  conn.rollback()
                  return True
              except Exception:  # validator: allow-wide-except
                  return False
          ''',
          )

          replace_once(
              "services/db/core.py",
              '''def execute(sql: str, params: tuple[Any, ...] = ()): 
              with db() as conn:
                  return conn.execute(sql, params)


          @contextmanager
          def tx(conn):
          ''',
              '''def execute(
              sql: str,
              params: Sequence[Any] = (),
              *,
              fetchone: bool = False,
              fetchall: bool = False,
          ):
              """Execute one statement and materialize results before close."""
              if fetchone and fetchall:
                  raise ValueError("execute accepts only one of fetchone/fetchall")
              with db() as conn:
                  cursor = conn.execute(sql, tuple(params))
                  if fetchone:
                      return cursor.fetchone()
                  if fetchall:
                      return cursor.fetchall()
                  if getattr(cursor, "description", None) is not None:
                      return cursor.fetchall()
                  try:
                      return int(getattr(cursor, "rowcount", 0) or 0)
                  except (TypeError, ValueError):
                      return 0


          @contextmanager
          def tx(conn):
          ''',
          )

