name: Temporary validator release-mode repair

on:
  push:
    branches:
      - agent/fix-validator-release-mode

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Fix immutable deploy validator release mode'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: agent/fix-validator-release-mode

      - name: Apply focused repair and regression lock
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          deploy_path = Path('scripts/immutable_deploy.sh')
          deploy = deploy_path.read_text(encoding='utf-8')
          old = 'env PYTHONDONTWRITEBYTECODE=1 VALIDATOR_RELEASE_MODE=0 VALIDATOR_STRICT=1'
          new = 'env PYTHONDONTWRITEBYTECODE=1 VALIDATOR_RELEASE_MODE=1 VALIDATOR_STRICT=1'
          if deploy.count(old) != 1:
              raise SystemExit(f'expected exactly one unsafe candidate validator invocation; got {deploy.count(old)}')
          deploy_path.write_text(deploy.replace(old, new, 1), encoding='utf-8')

          test_path = Path('tests/test_immutable_deploy_contract.py')
          tests = test_path.read_text(encoding='utf-8')
          test_name = 'test_candidate_validator_runs_with_release_guardrails'
          if test_name not in tests:
              tests += '''\n\ndef test_candidate_validator_runs_with_release_guardrails() -> None:\n    deploy = _text("scripts/immutable_deploy.sh")\n    start = deploy.index("validate_candidate_and_expand_schema() {")\n    end = deploy.index("verify_previous_release_on_expanded_schema() {", start)\n    candidate = deploy[start:end]\n\n    assert "VALIDATOR_RELEASE_MODE=1" in candidate\n    assert "VALIDATOR_RELEASE_MODE=0" not in candidate\n    assert "VALIDATOR_STRICT=1" in candidate\n    assert "VALIDATOR_GUARDRAILS_STRICT=1" in candidate\n'''
              test_path.write_text(tests, encoding='utf-8')
          PY

          rm -f .github/workflows/temp-fix-validator-release-mode.yml
          bash -n scripts/immutable_deploy.sh
          python -m py_compile tests/test_immutable_deploy_contract.py
          git diff --check

      - name: Commit focused repair
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/immutable_deploy.sh tests/test_immutable_deploy_contract.py .github/workflows/temp-fix-validator-release-mode.yml
          git commit -m 'Fix immutable deploy validator release mode'
          git push origin HEAD:agent/fix-validator-release-mode
