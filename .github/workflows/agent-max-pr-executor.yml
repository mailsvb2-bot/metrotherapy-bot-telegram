name: Temporary scoped MAX hardening executor

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/harden-max-api2-webhook-media'
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract and run the prepared patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/agent-max-hardening.yml')
          source = workflow.read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          if marker not in source or end_marker not in source:
              raise SystemExit('prepared patch block not found')
          body = source.split(marker, 1)[1].split(end_marker, 1)[0]
          code = textwrap.dedent(body)
          exec(compile(code, str(workflow), 'exec'), {'__name__': '__main__'})
          PY
          rm -f .github/workflows/agent-max-hardening.yml

      - name: Validate targeted MAX contracts
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m compileall -q runtime services scripts tests
          python -m pytest -q \
            tests/test_webhook_secret_fail_closed.py \
            tests/test_max_opus_preparation.py \
            tests/test_max_api2_contract.py \
            tests/test_max_user_journey_e2e.py \
            tests/test_messenger_package_payment_ui.py
          python -m ruff check \
            runtime/messenger_ingress.py \
            runtime/messenger_max_sender.py \
            services/messenger/max_audio.py \
            services/messenger/preflight.py \
            scripts/register_max_webhook.py \
            scripts/max_provider_audit.py \
            tests/test_max_api2_contract.py

      - name: Commit product changes to the scoped branch
        shell: bash
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "agent@openai.local"
          git add -A
          git commit -m "Harden MAX API2 webhook and media transport"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
