name: Postgres Smoke

on:
  push:
  pull_request:

jobs:
  postgres-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: metrotherapy_test
          POSTGRES_USER: metrotherapy
          POSTGRES_PASSWORD: metrotherapy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile
        run: python -m compileall .

      - name: Postgres schema smoke
        env:
          APP_ENV: test
          LOAD_DOTENV: '0'
          METRO_DB_ENGINE: postgres
          DATABASE_URL: postgresql://metrotherapy:metrotherapy@127.0.0.1:5432/metrotherapy_test
          BOT_TOKEN: 000000:TEST
          PAY_PROVIDER_TOKEN: 000000:TEST
          ADMIN_IDS: '1'
          TELEGRAM_TRANSPORT: polling
          TELEGRAM_WEBHOOK_ENABLED: '0'
          MESSENGER_WEBHOOK_ENABLED: '0'
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python - <<'PY'
          from services.schema import init_db
          from services.db import get_connection
          from services.jobs import add_job, claim_due_jobs, mark_done
          from core.time_utils import utc_now_iso

          init_db()
          with get_connection() as conn:
              assert conn.execute('SELECT 1').fetchone()
              tables = conn.execute("SELECT table_name FROM information_schema.tables WHERE table_schema=current_schema() AND table_name IN ('users','jobs','payments')").fetchall()
              names = {row['table_name'] if hasattr(row, 'keys') else row[0] for row in tables}
              assert {'users', 'jobs', 'payments'} <= names, names

          assert add_job(1, 'postgres_smoke', utc_now_iso(), {'ok': True}) is True
          claimed = claim_due_jobs(utc_now_iso(), limit=1)
          assert claimed, 'expected one claimed job'
          assert mark_done(claimed[0].id, claimed[0].lock_token) is True
          print('POSTGRES_SMOKE_OK')
          PY
