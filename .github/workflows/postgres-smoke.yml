name: Postgres Smoke (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metrotherapy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metrotherapy_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      LOAD_DOTENV: '0'
      METRO_DB_ENGINE: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/metrotherapy_ci
      POSTGRES_REUSE_CONNECTIONS: '0'
      POSTGRES_CI_SMOKE: '1'
      TELEGRAM_STARS_ENABLED: '1'
      BOT_TOKEN: '000000:CI'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - run: python scripts/postgres_ci_smoke.py
      - run: python scripts/probe_postgres_job_concurrency.py --workers 4 --jobs 16
