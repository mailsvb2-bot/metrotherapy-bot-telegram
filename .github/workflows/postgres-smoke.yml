name: Postgres Smoke Advisory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-smoke-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Advisory status
        run: |
          echo "POSTGRES_SMOKE_ADVISORY"
          echo "This workflow is manual-only and does not block pull requests."
          echo "A real Postgres gate can be re-enabled after an isolated database target is configured."
