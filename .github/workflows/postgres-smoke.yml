name: Postgres Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-smoke-advisory:
    runs-on: [self-hosted]
    timeout-minutes: 5
    steps:
      - name: Advisory status
        run: |
          echo "POSTGRES_SMOKE_ADVISORY"
          echo "This workflow is manual-only and does not block pull requests."
          echo "A dedicated CI runner with an isolated database target is required before making this gate blocking again."
