name: Production deploy recovery

# The GitHub Actions secret uses an allowed METRO_ prefix; server runtime keeps GITHUB_WEBHOOK_SECRET.
on:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  recover:
    if: contains(github.event.head_commit.message, '[recover-production-deploy]')
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Queue signed production main deploy
        id: recover
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.METRO_DEPLOY_WEBHOOK_SECRET }}
          DEPLOY_ENDPOINT: https://metrotherapy-bot.metrotherapy.ru/github-deploy
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -z "$DEPLOY_WEBHOOK_SECRET" ]; then
            echo "METRO_DEPLOY_WEBHOOK_SECRET is not configured in repository Actions secrets" >&2
            exit 2
          fi

          payload='{"ref":"refs/heads/main"}'
          signature="$(PAYLOAD="$payload" SECRET="$DEPLOY_WEBHOOK_SECRET" python - <<'PY'
          import hashlib
          import hmac
          import os

          payload = os.environ["PAYLOAD"].encode("utf-8")
          secret = os.environ["SECRET"].encode("utf-8")
          print("sha256=" + hmac.new(secret, payload, hashlib.sha256).hexdigest())
          PY
          )"

          response="$(curl -fsS --max-time 10 \
            -X POST "$DEPLOY_ENDPOINT" \
            -H 'Content-Type: application/json' \
            -H 'X-GitHub-Event: push' \
            -H "X-Hub-Signature-256: $signature" \
            --data "$payload")"
          echo "DEPLOY_RECOVERY_RESPONSE=$response"
          if [ "$response" != "deploy queued" ]; then
            echo "Expected 'deploy queued', got: $response" >&2
            exit 3
          fi

      - name: Publish deploy recovery status
        if: always()
        uses: actions/github-script@v7
        env:
          RECOVERY_OUTCOME: ${{ steps.recover.outcome }}
        with:
          script: |
            const ok = process.env.RECOVERY_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'ops/production-deploy-recovery',
              description: ok
                ? 'Signed production main deploy queued'
                : 'Production deploy recovery failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
