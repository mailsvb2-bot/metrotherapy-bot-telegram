name: Dependency Lock

on:
  pull_request:
    paths:
      - 'requirements.in'
      - 'requirements-dev.in'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'requirements-py313.txt'
      - '.github/workflows/dependency-lock.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lock:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    name: deterministic locks / py3.12+py3.13
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deterministic compiler for Python 3.12
        run: python -m pip install --disable-pip-version-check pip==26.1.2 pip-tools==7.5.3

      - name: Compile Python 3.12 hash locks
        run: |
          python -m piptools compile \
            --generate-hashes \
            --resolver=backtracking \
            --strip-extras \
            --output-file=requirements.txt \
            requirements.in
          python -m piptools compile \
            --generate-hashes \
            --resolver=backtracking \
            --strip-extras \
            --output-file=requirements-dev.txt \
            requirements-dev.in

      - name: Prove Python 3.12 runtime lock installation
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: pip

      - name: Install deterministic compiler for Python 3.13
        run: python -m pip install --disable-pip-version-check pip==26.1.2 pip-tools==7.5.3

      - name: Compile Python 3.13 runtime hash lock
        run: |
          python -m piptools compile \
            --generate-hashes \
            --resolver=backtracking \
            --strip-extras \
            --output-file=requirements-py313.txt \
            requirements.in

      - name: Prove Python 3.13 runtime lock installation
        run: python -m pip install --require-hashes -r requirements-py313.txt

      - name: Upload generated lock evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-dependency-locks
          path: |
            requirements.txt
            requirements-dev.txt
            requirements-py313.txt
          if-no-files-found: error

      - name: Reject tracked or untracked lock drift
        run: |
          changes="$(git status --porcelain -- requirements.txt requirements-dev.txt requirements-py313.txt)"
          if [ -n "$changes" ]; then
            printf '%s\n' "$changes"
            echo 'DEPENDENCY_LOCK_DRIFT'
            exit 1
          fi
          echo 'DEPENDENCY_LOCK_CURRENT'
