name: Single main topology cleanup

# Exact topology audits are requested explicitly through commit-message markers.
# The same marker is used after a reviewed merge to restore the canonical 1/main topology.
# Post-merge marker commits are code-neutral and only trigger the repository topology audit.
# Server audit retries are sent only after the preceding main regression contour is green.
# Production verifies the explicit pre-invoice Stars choice from release #114.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  statuses: write

jobs:
  cleanup:
    if: contains(github.event.head_commit.message, '[cleanup-branches]')
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Delete non-main branches and verify
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let failure = null;
            let description = 'GitHub branch cleanup did not complete';

            try {
              const branches = await github.paginate(
                github.rest.repos.listBranches,
                { owner, repo, per_page: 100 },
              );

              for (const branch of branches) {
                if (branch.name === 'main') continue;
                core.info(`Deleting non-main branch: ${branch.name}`);
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
              }

              const remaining = await github.paginate(
                github.rest.repos.listBranches,
                { owner, repo, per_page: 100 },
              );
              const names = remaining.map((branch) => branch.name).sort();
              core.info(`GITHUB_BRANCH_COUNT=${names.length}`);
              core.info(`GITHUB_BRANCHES=${names.join(',')}`);

              if (names.length !== 1 || names[0] !== 'main') {
                throw new Error(
                  `Expected exactly one GitHub branch named main; got ${names.length}: ${names.join(',')}`,
                );
              }
              description = `GitHub branches=${names.length}: ${names.join(',')}`;
            } catch (error) {
              failure = error;
              description = `Branch cleanup failed: ${error.message}`.slice(0, 140);
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              state: failure ? 'failure' : 'success',
              context: 'ops/single-main-topology',
              description,
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
            });

            if (failure) {
              core.setFailed(failure.message);
            }
