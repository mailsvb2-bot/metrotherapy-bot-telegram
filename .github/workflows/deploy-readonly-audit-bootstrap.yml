name: Deploy Read-only Audit Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact deploy audit patch
        run: python ops/apply_deploy_readonly_audit_fix.py

      - name: Validate shell syntax
        run: bash -n deploy.sh

      - name: Commit deploy change
        run: |
          changes="$(git status --porcelain -- deploy.sh)"
          if [ -z "$changes" ]; then
            echo 'DEPLOY_READONLY_AUDIT_ALREADY_APPLIED'
            exit 0
          fi
          printf '%s\n' "$changes"
          git config user.name 'Metrotherapy Deploy Governance'
          git config user.email 'deploy-governance@metrotherapy.local'
          git add deploy.sh
          git commit -m 'Make production branch audit read-only'
          git push origin "HEAD:${GITHUB_REF_NAME}"
