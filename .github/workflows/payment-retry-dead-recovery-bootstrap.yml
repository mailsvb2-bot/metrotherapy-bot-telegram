name: Payment Retry Dead Recovery Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Install payment retry dead recovery'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact recovery patch
        run: python ops/apply_payment_retry_dead_recovery.py

      - name: Validate Python syntax
        run: python -m py_compile services/payments/retry_queue.py

      - name: Commit recovery behavior
        run: |
          changes="$(git status --porcelain -- services/payments/retry_queue.py)"
          if [ -z "$changes" ]; then
            echo 'PAYMENT_RETRY_DEAD_RECOVERY_CURRENT'
            exit 0
          fi
          git config user.name 'Metrotherapy Payment Reliability'
          git config user.email 'payment-reliability@metrotherapy.local'
          git add services/payments/retry_queue.py
          git commit -m 'Allow successful provider replay to close dead retry'
          git push origin "HEAD:${GITHUB_REF_NAME}"
