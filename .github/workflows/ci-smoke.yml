name: CI Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted]
    timeout-minutes: 15
    env:
      CI_VENV: /tmp/metrotherapy-smoke-venv-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare isolated CI virtualenv
        run: |
          rm -rf "$CI_VENV"
          python3 -m venv "$CI_VENV"
          . "$CI_VENV/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Release hygiene
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/check_release_hygiene.py

      - name: Compile smoke surface
        run: |
          . "$CI_VENV/bin/activate"
          python -m compileall scripts/smoke.py services handlers core

      - name: Smoke
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/smoke.py
