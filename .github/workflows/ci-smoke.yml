name: CI Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted, linux, x64, metrotherapy-ci]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare isolated CI virtualenv
        run: |
          python3 -m venv .venv-ci
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Release hygiene
        run: |
          . .venv-ci/bin/activate
          python scripts/check_release_hygiene.py

      - name: Compile smoke surface
        run: |
          . .venv-ci/bin/activate
          python -m compileall scripts/smoke.py services handlers core

      - name: Smoke
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          . .venv-ci/bin/activate
          python scripts/smoke.py
