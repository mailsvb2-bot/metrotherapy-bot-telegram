name: Strict Guardrails

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: [self-hosted]
    timeout-minutes: 20
    env:
      CI_VENV: /tmp/metrotherapy-guardrails-venv
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare isolated CI virtualenv
        run: |
          rm -rf "$CI_VENV"
          python3 -m venv "$CI_VENV"
          . "$CI_VENV/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Compile
        run: |
          . "$CI_VENV/bin/activate"
          python -m compileall \
            services \
            scripts \
            handlers \
            core \
            app.py \
            main.py

      - name: Ruff quality gate
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/check_ruff.py

      - name: Strict validator with architecture guardrails
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          VALIDATOR_GUARDRAILS_STRICT: '1'
          VALIDATOR_SKIP_AUDIO: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/validate_project.py
