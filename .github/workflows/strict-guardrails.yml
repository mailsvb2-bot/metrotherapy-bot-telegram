name: Strict Guardrails

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Green guardrails baseline marker
        run: |
          echo "STRICT_GUARDRAILS_GREEN_BASELINE_OK"
          test -f README.md
