name: Strict Guardrails

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: prod
      VALIDATOR_RELEASE_MODE: '1'
      VALIDATOR_GUARDRAILS_STRICT: '1'
      VALIDATOR_SKIP_AUDIO: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Strict validator
        run: python scripts/validate_project.py

      - name: Ruff quality gate
        run: python scripts/check_ruff.py
