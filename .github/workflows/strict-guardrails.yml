name: Strict Guardrails

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest

      - name: Full pytest
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest -q

      - name: Strict validator with architecture guardrails
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          VALIDATOR_GUARDRAILS_STRICT: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: python scripts/validate_project.py

      - name: Smoke with architecture guardrails
        env:
          APP_ENV: prod
          VALIDATOR_GUARDRAILS_STRICT: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: python scripts/smoke.py
