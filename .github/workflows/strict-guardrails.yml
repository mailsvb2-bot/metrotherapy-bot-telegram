name: Strict Guardrails

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: [self-hosted, linux, x64, metrotherapy-ci]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare isolated CI virtualenv
        run: |
          python3 -m venv .venv-ci
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Compile
        run: |
          . .venv-ci/bin/activate
          python -m compileall .

      - name: Ruff quality gate
        run: |
          . .venv-ci/bin/activate
          python scripts/check_ruff.py

      - name: Strict validator with architecture guardrails
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          VALIDATOR_GUARDRAILS_STRICT: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          . .venv-ci/bin/activate
          python scripts/validate_project.py
