name: Strict Guardrails

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: prod
      VALIDATOR_RELEASE_MODE: '1'
      VALIDATOR_GUARDRAILS_STRICT: '1'
      VALIDATOR_SKIP_AUDIO: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install hash-locked guardrail dependencies
        run: |
          python -m pip install --disable-pip-version-check pip==26.1.2
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Strict validator
        run: python scripts/validate_project.py

      - name: Ruff quality gate
        run: python scripts/check_ruff.py
