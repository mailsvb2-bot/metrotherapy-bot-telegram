name: Apply Stars provider fix

on:
  push:
    branches:
      - agent/fix-stars-provider-account

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, '[apply-stars-provider-fix]')
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-stars-provider-account
          fetch-depth: 0

      - name: Apply native Stars invoice fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("services/payments/telegram_stars.py")
          source = source_path.read_text(encoding="utf-8")
          old = '''        # Telegram Stars requires an empty provider token by API contract.\n        provider_token="",  # nosec B106\n'''
          new = '''        # Native Stars invoices must not carry an external provider account.\n        # Omitting the optional field matches aiogram's reference Stars flow.\n'''
          if source.count(old) != 1:
              raise SystemExit("unexpected Telegram Stars invoice source shape")
          source_path.write_text(source.replace(old, new), encoding="utf-8")

          test_path = Path("tests/test_telegram_stars_payments.py")
          tests = test_path.read_text(encoding="utf-8")
          replacements = {
              "async def test_invoice_uses_xtr_and_empty_provider_token(monkeypatch) -> None:\n":
                  "async def test_invoice_uses_xtr_without_external_provider_token(monkeypatch) -> None:\n",
              "    monkeypatch.setattr(telegram_stars, \"log_event\", lambda *args, **kwargs: None)\n    captured = {}\n\n    class FakeMessage:\n":
                  "    monkeypatch.setattr(telegram_stars, \"log_event\", lambda *args, **kwargs: None)\n    monkeypatch.setenv(\"PAY_PROVIDER_TOKEN\", \"TEST:legacy-provider-must-not-leak\")\n    captured = {}\n\n    class FakeMessage:\n",
              "    assert captured[\"provider_token\"] == \"\"\n":
                  "    assert \"provider_token\" not in captured\n",
          }
          for old_text, new_text in replacements.items():
              if tests.count(old_text) != 1:
                  raise SystemExit(f"unexpected Stars regression test shape: {old_text!r}")
              tests = tests.replace(old_text, new_text)
          test_path.write_text(tests, encoding="utf-8")

          workflow_path = Path(".github/workflows/apply-stars-provider-fix.yml")
          workflow_path.unlink()
          PY

      - name: Commit fix to branch
        shell: bash
        run: |
          git config user.name "Metrotherapy Fix Bot"
          git config user.email "fix-bot@metrotherapy.local"
          git add services/payments/telegram_stars.py tests/test_telegram_stars_payments.py .github/workflows/apply-stars-provider-fix.yml
          git commit -m "Fix native Telegram Stars provider routing"
          git push origin HEAD:agent/fix-stars-provider-account
