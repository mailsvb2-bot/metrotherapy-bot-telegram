name: One-shot health env restoration

on:
  push:
    branches:
      - agent/protect-health-diagnostics
    paths:
      - tools/agent_restore_env_and_patch_health_docs.py
      - .github/workflows/agent-restore-env-health-docs.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/protect-health-diagnostics
          fetch-depth: 0

      - name: Restore from main and apply exact documentation patch
        run: python tools/agent_restore_env_and_patch_health_docs.py

      - name: Commit corrected environment example
        run: |
          if git diff --quiet -- deploy/metrotherapy.env.example; then
            echo "Expected env example correction was not produced" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/metrotherapy.env.example
          git commit -m "Restore env example and document diagnostics token"
          git push origin HEAD:agent/protect-health-diagnostics
