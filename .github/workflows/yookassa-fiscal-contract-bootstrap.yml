name: YooKassa Fiscal Contract Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Install YooKassa fiscal contract'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact fiscal contract
        run: python ops/apply_yookassa_fiscal_contract.py

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            config/settings.py \
            services/payments/common.py \
            services/payments/yookassa_checkout.py \
            services/validators/prod.py

      - name: Commit fiscal contract integration
        run: |
          changes="$(git status --porcelain -- config/settings.py services/payments/common.py services/payments/yookassa_checkout.py services/validators/prod.py)"
          if [ -z "$changes" ]; then
            echo 'YOOKASSA_FISCAL_CONTRACT_CURRENT'
            exit 0
          fi
          git config user.name 'Metrotherapy Fiscal Contract'
          git config user.email 'fiscal-contract@metrotherapy.local'
          git add config/settings.py services/payments/common.py services/payments/yookassa_checkout.py services/validators/prod.py
          git commit -m 'Enforce YooKassa fiscal receipt values'
          git push origin "HEAD:${GITHUB_REF_NAME}"
