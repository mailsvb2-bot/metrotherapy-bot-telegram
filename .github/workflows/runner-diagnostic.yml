name: Runner Diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Runner sanity
        run: |
          echo "runner ok"
          uname -a
      - name: Checkout
        uses: actions/checkout@v4
      - name: Repository sanity
        run: |
          pwd
          ls -la
          test -f README.md
