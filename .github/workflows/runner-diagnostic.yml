name: Runner Diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-diagnostic:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Runner sanity
        run: |
          echo "runner ok"
          uname -a
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Repository sanity
        run: |
          pwd
          ls -la
          test -f README.md
