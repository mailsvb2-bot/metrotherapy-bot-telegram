name: Apply Fundamental Hardening

on:
  push:
    branches:
      - agent/fundamental-payment-identity-hardening
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fundamental-payment-identity-hardening
          fetch-depth: 0

      - name: Apply validated atomic patch
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/patch.part.* > "$RUNNER_TEMP/fundamental.patch"
          git apply --index --whitespace=error-all "$RUNNER_TEMP/fundamental.patch"
          rm -rf .agent
          git rm .github/workflows/agent-source-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fundamentally harden payment and identity contracts"
          git push origin HEAD:agent/fundamental-payment-identity-hardening
