name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: metrotherapy_ci
          POSTGRES_USER: metrotherapy
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metrotherapy -d metrotherapy_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    name: quality / py${{ matrix.python-version }}
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Release hygiene before checks
        run: python scripts/check_release_hygiene.py

      - name: Compile project surface
        run: |
          python -m compileall \
            services \
            scripts \
            handlers \
            core \
            runtime \
            config \
            app.py \
            main.py

      - name: Smoke no polling
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          VALIDATOR_GUARDRAILS_STRICT: '1'
          VALIDATOR_SKIP_AUDIO: '1'
          ADMIN_IDS: '1'
          METRO_DB_ENGINE: postgres
          DATABASE_URL: postgresql://metrotherapy@127.0.0.1:5432/metrotherapy_ci
          YOOKASSA_SHOP_ID: x
          YOOKASSA_SECRET_KEY: x
          PAYMENT_CHECKOUT_SIGNING_KEY: x
          YOOKASSA_WEBHOOK_SECRET: x
          PAYMENT_PUBLIC_BASE_URL: 'https://metrotherapy.example'
          TELEGRAM_TRANSPORT: polling
          TELEGRAM_WEBHOOK_ENABLED: '0'
        run: python scripts/smoke.py

      - name: Full pytest regression gate
        env:
          APP_ENV: test
          LOAD_DOTENV: '0'
        run: python -m pytest -q -p no:cacheprovider

      - name: Strict validation
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          VALIDATOR_GUARDRAILS_STRICT: '1'
          VALIDATOR_SKIP_AUDIO: '1'
          ADMIN_IDS: '1'
          METRO_DB_ENGINE: postgres
          DATABASE_URL: postgresql://metrotherapy@127.0.0.1:5432/metrotherapy_ci
          YOOKASSA_SHOP_ID: x
          YOOKASSA_SECRET_KEY: x
          PAYMENT_CHECKOUT_SIGNING_KEY: x
          YOOKASSA_WEBHOOK_SECRET: x
          PAYMENT_PUBLIC_BASE_URL: 'https://metrotherapy.example'
          TELEGRAM_TRANSPORT: polling
          TELEGRAM_WEBHOOK_ENABLED: '0'
        run: python scripts/validate_project.py

      - name: Ruff quality gate
        run: python scripts/check_ruff.py

      - name: Runtime/payment type gate
        run: |
          python -m mypy \
            services/jobs.py \
            services/validators/prod.py \
            services/payments/checkout_intent.py \
            services/payments/yookassa_provider.py \
            services/payments/verified_reconciliation.py \
            runtime/payment_http.py \
            runtime/health_server.py \
            runtime/telegram_transport.py \
            services/privacy_controls.py

      - name: Runtime/payment security gate
        run: |
          python -m bandit -q -c pyproject.toml \
            services/jobs.py \
            services/validators/prod.py \
            services/payments \
            runtime/payment_http.py \
            runtime/health_server.py \
            runtime/telegram_transport.py \
            services/privacy_controls.py

      - name: Dependency audit gate
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Release hygiene after checks
        run: python scripts/check_release_hygiene.py
