name: CI
on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else python -m pip install pytest ruff; fi

      - name: Release hygiene
        run: python scripts/check_release_hygiene.py

      - name: Compile
        run: python -m compileall .

      - name: Ruff fatal checks
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Full pytest
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest -q

      - name: Validator (strict)
        env:
          APP_ENV: prod
          VALIDATOR_RELEASE_MODE: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: python scripts/validate_project.py

      - name: Smoke (no polling)
        env:
          APP_ENV: prod
          PYTHONDONTWRITEBYTECODE: '1'
        run: python scripts/smoke.py
