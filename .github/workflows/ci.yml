name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    name: quality / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Regression contour
        run: |
          set -o pipefail
          python scripts/regression_gate.py 2>&1 | tee "$RUNNER_TEMP/regression-contour.log"

      - name: Upload regression contour log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-contour-log
          path: ${{ runner.temp }}/regression-contour.log

      - name: Publish regression contour status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const state = conclusion === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'ci/regression-contour',
              description: state === 'success'
                ? 'Regression contour passed'
                : 'Regression contour failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
