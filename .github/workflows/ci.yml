name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted]
    timeout-minutes: 20
    env:
      CI_VENV: ${{ runner.temp }}/metrotherapy-ci-venv
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare isolated CI virtualenv
        run: |
          rm -rf "$CI_VENV"
          python3 -m venv "$CI_VENV"
          . "$CI_VENV/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff

      - name: Release hygiene
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/check_release_hygiene.py

      - name: Compile
        run: |
          . "$CI_VENV/bin/activate"
          python -m compileall \
            services \
            scripts \
            handlers \
            core \
            app.py \
            main.py

      - name: Ruff quality gate
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/check_ruff.py

      - name: Smoke no polling
        env:
          APP_ENV: prod
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          . "$CI_VENV/bin/activate"
          python scripts/smoke.py
