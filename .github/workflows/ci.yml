name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  apply-fundamental-hardening:
    if: github.event_name == 'push' && github.ref_name == 'agent/fundamental-payment-identity-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    name: apply fundamental hardening
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fundamental-payment-identity-hardening
          fetch-depth: 0

      - name: Apply atomic patch and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/patch.part.* > "$RUNNER_TEMP/fundamental.patch"
          git apply --index --whitespace=error-all --exclude=.github/workflows/ci.yml "$RUNNER_TEMP/fundamental.patch"
          cp .agent/final-ci.yml .github/workflows/ci.yml
          rm -rf .agent
          git rm .github/workflows/agent-source-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fundamentally harden payment and identity contracts"
          git push origin HEAD:agent/fundamental-payment-identity-hardening

  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    name: quality / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Regression contour
        run: |
          set -o pipefail
          python scripts/regression_gate.py 2>&1 | tee "$RUNNER_TEMP/regression-contour.log"

      - name: Upload regression contour log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-contour-log
          path: ${{ runner.temp }}/regression-contour.log

      - name: Publish regression contour status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const state = conclusion === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'ci/regression-contour',
              description: state === 'success'
                ? 'Regression contour passed'
                : 'Regression contour failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  postgres:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    name: postgres / payment and concurrency
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metrotherapy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metrotherapy_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      LOAD_DOTENV: '0'
      METRO_DB_ENGINE: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/metrotherapy_ci
      POSTGRES_REUSE_CONNECTIONS: '0'
      POSTGRES_CI_SMOKE: '1'
      TELEGRAM_STARS_ENABLED: '1'
      BOT_TOKEN: '000000:CI'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Postgres payment smoke
        run: python scripts/postgres_ci_smoke.py

      - name: Postgres scheduler concurrency
        run: python scripts/probe_postgres_job_concurrency.py --workers 4 --jobs 16
