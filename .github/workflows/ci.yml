name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    name: quality / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Immutable action pin gate
        run: python scripts/check_github_action_pins.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Regression contour
        run: |
          set -o pipefail
          python scripts/regression_gate.py 2>&1 | tee "$RUNNER_TEMP/regression-contour.log"

      - name: Upload regression contour log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: regression-contour-log
          path: ${{ runner.temp }}/regression-contour.log

      - name: Publish regression contour status
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const state = conclusion === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'ci/regression-contour',
              description: state === 'success'
                ? 'Regression contour passed'
                : 'Regression contour failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  static-security:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    name: static security / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      LOAD_DOTENV: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Critical type contracts
        run: |
          set -o pipefail
          python -m mypy --follow-imports=skip --check-untyped-defs \
            services/accounts/identity.py \
            services/messenger/text_ui.py \
            services/messenger/delivery_outbox.py \
            services/payments/checkout_intent.py \
            services/payments/telegram_stars.py \
            services/payments/telegram_stars_refunds.py \
            services/payments/verified_reconciliation.py \
            services/practice_token_lots.py \
            services/practice_tokens_access_core.py \
            services/practice_tokens_wallet.py \
            services/premium_entitlements.py \
            services/sales_desk.py \
            services/sales_desk_repository.py \
            services/sales_desk_sync.py \
            runtime/payment_http.py \
            runtime/payment_webhook_admission.py \
            2>&1 | tee "$RUNNER_TEMP/mypy-critical.log"

      - name: Critical security scan
        run: |
          set -o pipefail
          python -m bandit -q -r -c pyproject.toml \
            services/payments \
            services/accounts/identity.py \
            services/messenger/text_ui.py \
            services/messenger/delivery_outbox.py \
            services/practice_token_lots.py \
            services/practice_tokens_access_core.py \
            services/practice_tokens_wallet.py \
            services/premium_entitlements.py \
            services/sales_desk.py \
            services/sales_desk_db.py \
            services/sales_desk_repository.py \
            services/sales_desk_sync.py \
            runtime/payment_http.py \
            runtime/payment_webhook_admission.py \
            2>&1 | tee "$RUNNER_TEMP/bandit-critical.log"

      - name: Dependency vulnerability audit
        run: |
          set -o pipefail
          python -m pip_audit -r requirements.txt --progress-spinner off \
            2>&1 | tee "$RUNNER_TEMP/pip-audit.log"

      - name: Upload static analysis logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: static-analysis-logs
          path: |
            ${{ runner.temp }}/mypy-critical.log
            ${{ runner.temp }}/bandit-critical.log
            ${{ runner.temp }}/pip-audit.log
          if-no-files-found: warn

  postgres:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    name: postgres / payment and concurrency
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metrotherapy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metrotherapy_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      LOAD_DOTENV: '0'
      METRO_DB_ENGINE: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/metrotherapy_ci
      POSTGRES_REUSE_CONNECTIONS: '0'
      POSTGRES_CI_SMOKE: '1'
      TELEGRAM_STARS_ENABLED: '1'
      BOT_TOKEN: '000000:CI'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Postgres payment smoke
        run: |
          set -o pipefail
          python scripts/postgres_ci_smoke.py 2>&1 | tee "$RUNNER_TEMP/postgres-payment.log"

      - name: Postgres scheduler concurrency
        run: |
          set -o pipefail
          python scripts/probe_postgres_job_concurrency.py --workers 4 --jobs 16 \
            2>&1 | tee "$RUNNER_TEMP/postgres-scheduler.log"

      - name: Postgres messenger outbox concurrency
        run: |
          set -o pipefail
          python scripts/probe_postgres_messenger_outbox.py \
            2>&1 | tee "$RUNNER_TEMP/postgres-messenger-outbox.log"

      - name: Upload Postgres probe logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: postgres-probe-logs
          path: |
            ${{ runner.temp }}/postgres-payment.log
            ${{ runner.temp }}/postgres-scheduler.log
            ${{ runner.temp }}/postgres-messenger-outbox.log
          if-no-files-found: warn
