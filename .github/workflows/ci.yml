name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_ENV: prod
      VALIDATOR_RELEASE_MODE: '1'
      VALIDATOR_GUARDRAILS_STRICT: '1'
      VALIDATOR_SKIP_AUDIO: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Release hygiene before checks
        run: python scripts/check_release_hygiene.py

      - name: Compile project surface
        run: |
          python -m compileall \
            services \
            scripts \
            handlers \
            core \
            runtime \
            config \
            app.py \
            main.py

      - name: Smoke no polling
        run: python scripts/smoke.py

      - name: Full pytest regression gate
        run: python -m pytest -q -p no:cacheprovider

      - name: Strict validation
        run: python scripts/validate_project.py

      - name: Ruff quality gate
        run: python scripts/check_ruff.py

      - name: Payment hardening type gate
        run: |
          python -m mypy \
            services/payments/checkout_intent.py \
            services/payments/yookassa_provider.py \
            services/payments/verified_reconciliation.py \
            runtime/payment_http.py

      - name: Payment hardening security gate
        run: python -m bandit -q -c pyproject.toml services/payments runtime/payment_http.py

      - name: Dependency audit gate
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Release hygiene after checks
        run: python scripts/check_release_hygiene.py
