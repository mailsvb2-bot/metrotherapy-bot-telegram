name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    name: quality / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Immutable action pin gate
        run: python scripts/check_github_action_pins.py

      - name: Install hash-locked dependencies
        run: |
          python -m pip install --disable-pip-version-check pip==26.1.2
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install --require-hashes -r requirements-coverage.txt

      - name: Regression contour
        id: regression
        run: |
          set -o pipefail
          python scripts/regression_gate_ci.py 2>&1 | tee "$RUNNER_TEMP/regression-contour.log"

      - name: Publish regression contour status
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const outcome = '${{ steps.regression.outcome }}';
            const state = outcome === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'ci/regression-contour',
              description: state === 'success'
                ? 'Regression contour passed'
                : 'Regression contour failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Coverage ratchet
        id: coverage
        env:
          COVERAGE_ARTIFACT_DIR: ${{ runner.temp }}/coverage
        run: |
          set -o pipefail
          python scripts/coverage_gate.py 2>&1 | tee "$RUNNER_TEMP/coverage-gate.log"

      - name: Upload regression contour log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: regression-contour-log
          path: ${{ runner.temp }}/regression-contour.log

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-reports
          path: |
            ${{ runner.temp }}/coverage
            ${{ runner.temp }}/coverage-gate.log
          if-no-files-found: warn

      - name: Publish coverage ratchet status
        if: always()
        env:
          COVERAGE_SUMMARY_PATH: ${{ runner.temp }}/coverage/coverage-summary.json
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const summaryPath = process.env.COVERAGE_SUMMARY_PATH;
            let state = 'failure';
            let description = 'Coverage report unavailable';
            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              state = summary.passed ? 'success' : 'failure';
              const total = Number(summary.total_percent);
              const baseline = Number(summary.baseline_percent);
              if (Number.isFinite(total) && Number.isFinite(baseline)) {
                description = `Coverage ${total.toFixed(2)}% / baseline ${baseline.toFixed(2)}%`;
              } else {
                description = summary.passed ? 'Coverage ratchet passed' : 'Coverage ratchet failed';
              }
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'ci/coverage-ratchet',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  static-security:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    name: static security / py3.12
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      LOAD_DOTENV: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install hash-locked dependencies
        run: |
          python -m pip install --disable-pip-version-check pip==26.1.2
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Critical static manifest
        run: python scripts/critical_static_gate.py manifest

      - name: Critical type contracts
        run: |
          set -o pipefail
          python scripts/critical_static_gate.py mypy 2>&1 | tee "$RUNNER_TEMP/mypy-critical.log"

      - name: Critical security scan
        run: |
          set -o pipefail
          python scripts/critical_static_gate.py bandit 2>&1 | tee "$RUNNER_TEMP/bandit-critical.log"

      - name: Dependency vulnerability audit
        run: |
          set -o pipefail
          python -m pip_audit -r requirements.txt --progress-spinner off \
            2>&1 | tee "$RUNNER_TEMP/pip-audit.log"

      - name: Upload static analysis logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: static-analysis-logs
          path: |
            ${{ runner.temp }}/mypy-critical.log
            ${{ runner.temp }}/bandit-critical.log
            ${{ runner.temp }}/pip-audit.log
          if-no-files-found: warn

  postgres:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    name: postgres / payment and concurrency
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metrotherapy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metrotherapy_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      LOAD_DOTENV: '0'
      METRO_DB_ENGINE: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/metrotherapy_ci
      POSTGRES_REUSE_CONNECTIONS: '1'
      POSTGRES_CI_SMOKE: '1'
      TELEGRAM_STARS_ENABLED: '1'
      BOT_TOKEN: '000000:CI'
      TELEGRAM_TRANSPORT: polling
      TELEGRAM_WEBHOOK_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install hash-locked dependencies
        run: |
          python -m pip install --disable-pip-version-check pip==26.1.2
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Postgres payment smoke without connection reuse
        env:
          POSTGRES_REUSE_CONNECTIONS: '0'
        run: |
          set -o pipefail
          python scripts/postgres_ci_smoke.py 2>&1 | tee "$RUNNER_TEMP/postgres-payment-no-reuse.log"

      - name: Reset Postgres smoke database
        run: |
          python - <<'PY'
          import psycopg
          with psycopg.connect('postgresql://postgres:postgres@127.0.0.1:5432/postgres', autocommit=True) as conn:
              conn.execute('DROP DATABASE IF EXISTS metrotherapy_ci WITH (FORCE)')
              conn.execute('CREATE DATABASE metrotherapy_ci')
          PY

      - name: Postgres payment smoke with production connection reuse
        run: |
          set -o pipefail
          python scripts/postgres_ci_smoke.py 2>&1 | tee "$RUNNER_TEMP/postgres-payment-reuse.log"

      - name: Postgres scheduler concurrency
        run: |
          set -o pipefail
          python scripts/probe_postgres_job_concurrency.py --workers 4 --jobs 16 \
            2>&1 | tee "$RUNNER_TEMP/postgres-scheduler.log"

      - name: Postgres messenger outbox concurrency
        run: |
          set -o pipefail
          python scripts/probe_postgres_messenger_outbox.py \
            2>&1 | tee "$RUNNER_TEMP/postgres-messenger-outbox.log"

      - name: Upload Postgres probe logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: postgres-probe-logs
          path: |
            ${{ runner.temp }}/postgres-payment-no-reuse.log
            ${{ runner.temp }}/postgres-payment-reuse.log
            ${{ runner.temp }}/postgres-scheduler.log
            ${{ runner.temp }}/postgres-messenger-outbox.log
          if-no-files-found: warn
