name: Temporary patch failure log extractor

on:
  push:
    branches:
      - agent/runtime-hardening-closure

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await new Promise((resolve) => setTimeout(resolve, 20000));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, head_sha: context.sha, per_page: 100,
            });
            const patchRun = runs.data.workflow_runs.find(
              (run) => run.name === 'One-shot audited runtime patch'
            );
            if (!patchRun) throw new Error('patch workflow run not found');
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: patchRun.id, per_page: 100,
            });
            const failed = jobs.data.jobs.find((job) => job.conclusion === 'failure');
            if (!failed) throw new Error(`failed patch job not found; run status=${patchRun.status}`);
            const logResponse = await github.request(
              'GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs',
              { owner, repo, job_id: failed.id }
            );
            const raw = typeof logResponse.data === 'string'
              ? logResponse.data
              : Buffer.from(logResponse.data).toString('utf8');
            const lines = raw.split(/\r?\n/);
            const important = lines.filter((line) =>
              line.includes('expected exactly') ||
              line.includes('SystemExit') ||
              line.includes('Traceback') ||
              line.includes('Error:') ||
              line.includes('Process completed')
            );
            const report = [
              `run_id=${patchRun.id}`,
              `job_id=${failed.id}`,
              ...important.slice(-30),
              '--- tail ---',
              ...lines.slice(-60),
            ].join('\n');
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: 'tmp/agent-patch-error.txt',
              message: 'Capture one-shot patch failure reason',
              content: Buffer.from(report).toString('base64'),
              branch: 'agent/runtime-hardening-closure',
            });
