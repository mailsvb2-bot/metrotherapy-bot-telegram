name: Payment Retry Scheduler Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Install payment retry scheduler hook'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact scheduler hook
        run: python ops/apply_payment_retry_scheduler_hook.py

      - name: Validate Python syntax
        run: python -m py_compile services/scheduler.py

      - name: Commit scheduler hook
        run: |
          changes="$(git status --porcelain -- services/scheduler.py)"
          if [ -z "$changes" ]; then
            echo 'PAYMENT_RETRY_SCHEDULER_ALREADY_CURRENT'
            exit 0
          fi
          printf '%s\n' "$changes"
          git config user.name 'Metrotherapy Payment Reliability'
          git config user.email 'payment-reliability@metrotherapy.local'
          git add services/scheduler.py
          git commit -m 'Wire durable payment retry scheduler tick'
          git push origin "HEAD:${GITHUB_REF_NAME}"
