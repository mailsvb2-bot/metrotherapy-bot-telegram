name: PR150 Type Fix Bootstrap

on:
  push:
    branches:
      - agent/payment-reconciliation-reliability

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Apply exact type fixes
        run: python ops/apply_pr150_type_fixes.py

      - name: Commit patched source files
        run: |
          changes="$(git status --porcelain -- services/payments/yookassa_refunds.py runtime/messenger_webhooks.py)"
          if [ -z "$changes" ]; then
            echo 'PR150_TYPE_FIXES_ALREADY_APPLIED'
            exit 0
          fi
          printf '%s\n' "$changes"
          git config user.name 'Metrotherapy Type Fix'
          git config user.email 'type-fix@metrotherapy.local'
          git add services/payments/yookassa_refunds.py runtime/messenger_webhooks.py
          git commit -m 'Fix expanded critical mypy findings'
          git push origin "HEAD:${GITHUB_REF_NAME}"
