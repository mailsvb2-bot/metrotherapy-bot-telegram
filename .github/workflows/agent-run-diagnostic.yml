name: Temporary workflow run diagnostic

on:
  push:
    branches:
      - agent/runtime-hardening-closure

permissions:
  actions: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              per_page: 100,
            });
            for (const run of response.data.workflow_runs) {
              core.info(`RUN id=${run.id} name=${run.name} event=${run.event} status=${run.status} conclusion=${run.conclusion}`);
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'agent/workflow-run-diagnostic',
              description: `Found ${response.data.workflow_runs.length} workflow runs`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
