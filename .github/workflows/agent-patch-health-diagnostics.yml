name: One-shot health diagnostics patch

on:
  push:
    branches:
      - agent/protect-health-diagnostics
    paths:
      - tools/agent_patch_health_diagnostics.py
      - .github/workflows/agent-patch-health-diagnostics.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/protect-health-diagnostics
          fetch-depth: 0

      - name: Apply exact patch
        run: |
          python tools/agent_patch_health_diagnostics.py
          python -m py_compile runtime/health_server.py

      - name: Commit patched health runtime
        run: |
          if git diff --quiet -- runtime/health_server.py; then
            echo "Expected runtime/health_server.py patch was not produced" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/health_server.py
          git commit -m "Protect detailed health diagnostics behind token"
          git push origin HEAD:agent/protect-health-diagnostics
