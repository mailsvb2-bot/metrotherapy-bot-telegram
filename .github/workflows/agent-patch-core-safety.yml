name: One-shot core safety patch

on:
  push:
    branches:
      - agent/remove-driving-safety-contradiction
    paths:
      - tools/agent_patch_core_safety_copy.py
      - .github/workflows/agent-patch-core-safety.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/remove-driving-safety-contradiction
          fetch-depth: 0

      - name: Apply exact patch
        run: |
          python tools/agent_patch_core_safety_copy.py
          python -m py_compile core/engine.py

      - name: Commit patched core
        run: |
          if git diff --quiet -- core/engine.py; then
            echo "Expected core/engine.py patch was not produced" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/engine.py
          git commit -m "Remove driving safety contradiction from core copy"
          git push origin HEAD:agent/remove-driving-safety-contradiction
